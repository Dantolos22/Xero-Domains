<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

    --grey: #f4f5f7; --grey-border: #dde1e7; --text: #1a1a2e;
    --text-light: #5e6c84; --oos: #b0b8c9; --oos-bg: #f0f1f4;
    --amber: #f59e0b; --amber-bg: #fef3c7; --red: #ef4444;
    --shadow: 0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.06);

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #eef0f4; color: var(--text); min-height: 100vh; }

  header { background: white; border-bottom: 1px solid var(--grey-border); padding: 0 20px; display: flex; align-items: center; gap: 12px; height: 52px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  header .logo { font-weight: 700; font-size: 16px; color: var(--blue); letter-spacing: -.3px; }
  header .sep { color: var(--grey-border); }
  header .title { font-size: 14px; font-weight: 600; }
  header .spacer { flex: 1; }
  header .chip { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: var(--grey); color: var(--text-light); font-weight: 500; border: 1px solid var(--grey-border); }
  header .chip.connected { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
  header .chip.connecting { background: #fef9c3; color: #854d0e; border-color: #fde68a; }

  .btn { cursor: pointer; border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; padding: 5px 10px; transition: background .15s; }
  .btn:active { opacity: .8; }
  .btn-ghost { background: transparent; color: var(--text-light); border: 1px solid var(--grey-border); }
  .btn-ghost:hover { background: var(--grey); }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: #0fa3d4; }

  .toolbar { padding: 10px 20px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; background: white; border-bottom: 1px solid var(--grey-border); }
  .toolbar .sep { width: 1px; height: 20px; background: var(--grey-border); margin: 0 2px; }

  .board { padding: 20px; display: flex; flex-direction: column; gap: 24px; }

  .section { display: flex; flex-direction: column; gap: 6px; }
  .section-header { display: flex; align-items: center; gap: 8px; padding: 0 4px 4px; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-light); cursor: pointer; border-radius: 3px; padding: 1px 4px; }
  .section-label:hover { background: var(--grey); color: var(--text); }
  .section-label-input { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text); border: 1px solid var(--blue); border-radius: 3px; padding: 1px 4px; background: white; outline: none; width: 180px; }
  .section-btn { cursor: pointer; border: none; background: transparent; color: var(--text-light); font-size: 11px; padding: 1px 4px; border-radius: 3px; line-height: 1; opacity: 0; transition: opacity .15s; display: flex; align-items: center; }
  .section-header:hover .section-btn { opacity: 1; }
  .section-btn:hover { background: var(--grey); color: var(--text); }
  .section-btn.del:hover { color: var(--red); }
  .section-line { flex: 1; height: 1px; background: var(--grey-border); }
  .section-groups { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
  .add-section-wrap { padding: 4px 24px 20px; }
  .add-section-btn { cursor: pointer; border: 1px dashed var(--grey-border); background: transparent; color: var(--text-light); font-size: 12px; font-weight: 600; padding: 7px 16px; border-radius: var(--radius-sm); transition: all .15s; }
  .add-section-btn:hover { background: white; color: var(--blue); border-color: var(--blue); }

  .group { background: white; border-radius: var(--radius); border: 1px solid var(--grey-border); box-shadow: var(--shadow); width: 210px; flex-shrink: 0; display: flex; flex-direction: column; transition: box-shadow .15s, border-color .15s; }
  .group.oos { opacity: .55; border-color: #d0d5de; }
  .group.sortable-chosen { box-shadow: var(--shadow-lg); border-color: var(--blue); }
  .group.sortable-ghost { opacity: .4; }

  .group-header { display: flex; align-items: center; gap: 6px; padding: 9px 10px 8px; border-bottom: 2px solid var(--blue-mid); user-select: none; }
  .group.oos .group-header { border-bottom-color: var(--oos); }

  .drag-handle { cursor: grab; color: var(--text-light); font-size: 14px; line-height: 1; padding: 1px 2px; border-radius: 3px; flex-shrink: 0; }
  .drag-handle:hover { background: var(--grey); }
  .drag-handle:active { cursor: grabbing; }

  .group-name-wrap { flex: 1; min-width: 0; }
  .group-name { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  .group-name:hover { color: var(--blue); }
  .group-name-input { font-size: 12px; font-weight: 700; width: 100%; border: 1px solid var(--blue); border-radius: 3px; padding: 1px 4px; outline: none; }

  .group-actions { display: flex; gap: 2px; }
  .icon-btn { cursor: pointer; border: none; background: transparent; color: var(--text-light); font-size: 13px; padding: 2px 4px; border-radius: 3px; line-height: 1; }
  .icon-btn:hover { background: var(--grey); color: var(--text); }
  .icon-btn.red:hover { background: #fee2e2; color: var(--red); }

  .domain-list { padding: 6px 8px; display: flex; flex-direction: column; gap: 3px; min-height: 32px; }

  .domain { display: flex; align-items: center; gap: 5px; background: var(--blue-light); border: 1px solid var(--blue-mid); border-radius: var(--radius-sm); padding: 4px 7px; cursor: grab; transition: box-shadow .1s, background .1s; user-select: none; min-height: 28px; }
  .domain:hover { box-shadow: 0 1px 4px rgba(19,181,234,.25); }

  .domain.oos { background: var(--oos-bg); border-color: #d0d5de; }
  .domain.sortable-ghost { opacity: .35; }
  .domain.sortable-chosen { box-shadow: 0 2px 8px rgba(19,181,234,.4); background: var(--blue); }
  .domain.sortable-chosen .domain-name { color: white; }

  .domain-name { font-size: 11px; font-weight: 500; flex: 1; color: var(--text); cursor: pointer; }
  .domain.oos .domain-name { color: var(--oos); }
  .domain-name:hover { color: var(--blue); }
  .domain-name-input { font-size: 11px; font-weight: 500; flex: 1; border: 1px solid var(--blue); border-radius: 3px; padding: 1px 4px; outline: none; }

  .flag { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; letter-spacing: .03em; flex-shrink: 0; cursor: pointer; user-select: none; }
  .flag-h { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
  .flag-m { background: var(--amber-bg); color: #92400e; border: 1px solid #fde68a; }
  .flag-l { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
  .flag-oos { background: var(--oos-bg); color: #64748b; border: 1px solid #cbd5e1; font-style: italic; cursor: default; }

  .domain-del { cursor: pointer; color: #ccc; font-size: 13px; flex-shrink: 0; line-height: 1; border-radius: 2px; padding: 0 1px; }
  .domain-del:hover { color: var(--red); background: #fee2e2; }

  .add-domain { padding: 4px 8px 8px; display: flex; gap: 4px; }
  .add-domain-input { flex: 1; font-size: 11px; border: 1px solid var(--grey-border); border-radius: var(--radius-sm); padding: 4px 6px; outline: none; transition: border-color .15s; }
  .add-domain-input:focus { border-color: var(--blue); }
  .add-domain-btn { font-size: 16px; line-height: 1; cursor: pointer; border: none; background: var(--blue-light); color: var(--blue); border-radius: var(--radius-sm); padding: 2px 7px; font-weight: 700; }
  .add-domain-btn:hover { background: var(--blue); color: white; }

  .add-group { width: 210px; height: 44px; border-radius: var(--radius); border: 2px dashed var(--grey-border); background: transparent; cursor: pointer; font-size: 12px; color: var(--text-light); font-weight: 600; transition: border-color .15s, color .15s; display: flex; align-items: center; justify-content: center; gap: 5px; flex-shrink: 0; }
  .add-group:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: white; border-radius: 12px; padding: 24px; width: 400px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; gap: 14px; }
  .modal h2 { font-size: 16px; font-weight: 700; }
  .modal p { font-size: 13px; color: var(--text-light); line-height: 1.5; }
  .modal label { font-size: 12px; font-weight: 600; }
  .modal input { width: 100%; padding: 8px 10px; border: 1px solid var(--grey-border); border-radius: var(--radius-sm); font-size: 13px; outline: none; }
  .modal input:focus { border-color: var(--blue); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-code { background: var(--grey); font-size: 12px; font-family: monospace; user-select: all; color: var(--text); border: 1px solid var(--grey-border); padding: 8px 10px; border-radius: var(--radius-sm); word-break: break-all; }

  .toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
  .toast { background: var(--text); color: white; font-size: 12px; font-weight: 500; padding: 8px 14px; border-radius: var(--radius); box-shadow: var(--shadow-lg); animation: toastIn .2s ease; max-width: 300px; }
  @keyframes toastIn { from { opacity:0; transform: translateY(6px); } }

  /* ── SIDEBAR ── */
  .sidebar { position: fixed; left: 0; top: 52px; bottom: 0; width: 248px; background: white; border-right: 1px solid var(--grey-border); display: flex; flex-direction: column; transform: translateX(-248px); transition: transform .22s ease; z-index: 50; box-shadow: 3px 0 12px rgba(0,0,0,.07); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-hdr { padding: 14px 16px 12px; border-bottom: 1px solid var(--grey-border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-title { font-size: 12px; font-weight: 700; color: var(--text); letter-spacing: .03em; }
  .sidebar-close { cursor: pointer; border: none; background: transparent; color: var(--text-light); font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 3px; }
  .sidebar-close:hover { background: var(--grey); color: var(--text); }
  .sidebar-body { flex: 1; overflow-y: auto; }
  .sidebar-empty { padding: 28px 16px; text-align: center; color: var(--text-light); font-size: 12px; line-height: 1.6; }
  .sidebar-ftr { padding: 12px 14px; border-top: 1px solid var(--grey-border); display: flex; flex-direction: column; gap: 6px; }
  .v-item { padding: 11px 14px; border-bottom: 1px solid var(--grey-border); transition: background .12s; }
  .v-item:hover { background: var(--grey); }
  .v-item:last-child { border-bottom: none; }
  .v-num { font-size: 9px; font-weight: 700; letter-spacing: .06em; color: var(--text-light); text-transform: uppercase; margin-bottom: 2px; }
  .v-name { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .v-meta { font-size: 10px; color: var(--text-light); margin-bottom: 7px; }
  .v-btns { display: flex; gap: 6px; }
  .v-btn { cursor: pointer; border: 1px solid var(--grey-border); background: white; color: var(--text-light); font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 3px; }
  .v-btn:hover { background: var(--blue-light); border-color: var(--blue); color: var(--blue); }
  .v-btn.danger:hover { background: #fee2e2; border-color: var(--red); color: var(--red); }

  .v-badge { position: absolute; top: -4px; right: -4px; background: var(--blue); color: white; font-size: 9px; font-weight: 700; border-radius: 10px; padding: 1px 5px; line-height: 1.4; }
  body.sidebar-open .toolbar,

  body:not(.sidebar-open) .toolbar,
  body:not(.sidebar-open) .tab-bar,
  body:not(.sidebar-open) .board { margin-left: 0; transition: margin-left .22s ease; }

  /* ── SCENARIO TABS ── */
  .tab-bar { background: white; border-bottom: 1px solid var(--grey-border); padding: 0 16px; display: flex; align-items: flex-end; gap: 0; overflow-x: auto; }
  .tab { display: flex; align-items: center; gap: 5px; padding: 8px 14px 7px; cursor: pointer; border-bottom: 2px solid transparent; font-size: 12px; font-weight: 500; color: var(--text-light); white-space: nowrap; border-radius: 4px 4px 0 0; transition: color .12s, background .12s; user-select: none; position: relative; }
  .tab:hover { color: var(--text); background: var(--grey); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 700; background: var(--blue-light); }
  .tab-name { pointer-events: auto; }
  .tab-name-input { font-size: 12px; font-weight: 700; border: 1px solid var(--blue); border-radius: 3px; padding: 1px 5px; outline: none; width: 120px; }
  .tab-del { opacity: 0; font-size: 14px; color: var(--text-light); border: none; background: transparent; cursor: pointer; padding: 0 2px; border-radius: 2px; line-height: 1; margin-left: 2px; }
  .tab:hover .tab-del { opacity: 1; }
  .tab-del:hover { color: var(--red); background: #fee2e2; }
  .tab-add { padding: 8px 12px 7px; cursor: pointer; color: var(--text-light); font-size: 18px; line-height: 1; border: none; background: transparent; border-radius: 4px 4px 0 0; font-weight: 300; }
  .tab-add:hover { color: var(--blue); background: var(--grey); }
</style>
</head>

<header>

</header>

  <button class="btn btn-ghost" onclick="saveVersion()" title="Save a named snapshot">💾 Save Version</button>
  <div class="sep"></div>
  <button class="btn btn-ghost" onclick="doUndo()">↩ Undo</button>
  <button class="btn btn-ghost" onclick="doRedo()">↪ Redo</button>

  <button class="btn btn-ghost" id="shareBtn" onclick="shareUrl()" style="display:none">🔀 Share URL</button>
  <div class="sep"></div>
  <button class="btn btn-ghost" onclick="exportExcel()">⬇ Export to Excel</button>
  <button class="btn btn-ghost" onclick="exportJSON()">⬇ Export JSON</button>
  <button class="btn btn-ghost" onclick="importJSON()">⬆ Import JSON</button>
  <div class="sep"></div>
</div>

<div class="tab-bar" id="tabBar"></div>

<!-- VERSION HISTORY SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-hdr">
    <span class="sidebar-title">🕐 Version History</span>
    <button class="sidebar-close" onclick="toggleSidebar()" title="Close">✕</button>
  </div>
  <div class="sidebar-body" id="sidebarBody"></div>
  <div class="sidebar-ftr">
    <button class="btn btn-primary" onclick="saveVersion()" style="width:100%;justify-content:center">💾 Save Version</button>

</div>

<div class="board" id="board"></div>

<!-- CONNECT MODAL -->
<div class="overlay" id="connectOverlay">
  <div class="modal">
    <h2>🔗 Go Live</h2>

    <label>Supabase URL</label>
    <input type="text" id="sbUrlInput" placeholder="https://xxxx.supabase.co" autocomplete="off" />
    <label>Supabase Anon Key</label>
    <input type="text" id="sbKeyInput" placeholder="sb_publishable_..." autocomplete="off" />
    <label>Room Name</label>
    <input type="text" id="sbRoomInput" placeholder="e.g. aaa-domains" />
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('connectOverlay')">Cancel</button>
      <button class="btn btn-primary" onclick="connectFromModal()">Connect</button>
    </div>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="overlay" id="shareOverlay">
  <div class="modal">
    <h2>🔀 Share with your team</h2>
    <p>Anyone opening this link joins the same live room instantly.</p>
    <div class="modal-code" id="shareUrlText"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('shareOverlay')">Close</button>
      <button class="btn btn-primary" onclick="copyShareUrl()">Copy Link</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

function isValidState(o) {
  if (!o) return false;
  if (o.scenarios && Array.isArray(o.scenarios) && o.scenarios.length > 0) return true;
  if (o.sections && Array.isArray(o.sections) && o.sections.length > 0) return true; // legacy
  return false;
}
function migrateState(p) {
  if (!p) return null;
  if (p.scenarios) return p; // already new format
  if (p.sections) { // legacy single-scenario format
    const id = "sc-migrated";
    return { activeScenario: id, scenarios: [{ id, name: "Default", versions: p.versions||[], sections: p.sections }] };
  }
  return null;
}
// Returns the active scenario object
function cur() { return S.scenarios.find(sc=>sc.id===S.activeScenario)||S.scenarios[0]; }

function pushU() { undos.push(clone(S)); if (undos.length>80) undos.shift(); redos=[]; }
function doUndo() { if (!undos.length) return toast("Nothing to undo"); redos.push(clone(S)); S=undos.pop(); render(); saveLocal(); sbPush(); }
function doRedo() { if (!redos.length) return toast("Nothing to redo"); undos.push(clone(S)); S=redos.pop(); render(); saveLocal(); sbPush(); }

const LS_KEY = "domain-taxonomy-v2";
function saveLocal() { try { localStorage.setItem(LS_KEY, JSON.stringify(S)); } catch(e){} }
function loadLocal() {
  try {
    const d = localStorage.getItem(LS_KEY);
    if (d) { const p = JSON.parse(d); const m = migrateState(p); if (m && isValidState(m)) S = m; }
  } catch(e) {}
}

// TOAST (defined early so always available)

function toast(msg, dur=2800) {
  const w = document.getElementById("toastWrap");
  if (!w) return;
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  w.appendChild(t);
  setTimeout(() => { t.style.opacity="0"; t.style.transition="opacity .3s"; setTimeout(()=>t.remove(),300); }, dur);
}

// ═══════════════════════════════════════════════════════
// SUPABASE SYNC
// ═══════════════════════════════════════════════════════
let sbClient = null, sbChannel = null, sbRoom = null;
let sbBusy = false, sbPushTimer = null;

function connectSupabase(url, key, room) {
  sbRoom = room;
  setChip("connecting", "Connecting…");
  if (!window.supabase) {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
    s.onload = () => _doConnect(url, key, room);
    s.onerror = () => { setChip("","Offline"); toast("❌ Failed to load Supabase SDK"); };
    document.head.appendChild(s);
  } else {
    _doConnect(url, key, room);
  }
}

async function _doConnect(url, key, room) {
  try {
    const { createClient } = window.supabase;
    sbClient = createClient(url, key);

    // Load state from database
    const { data, error } = await sbClient
      .from("taxonomy_state")
      .select("state")
      .eq("room", room)
      .maybeSingle();

    if (error) { console.warn("DB read error:", error.message); }

    if (data && isValidState(data.state)) {
      S = migrateState(data.state) || data.state;
      render(); saveLocal();
    } else {
      // No state in DB yet — push ours
      await sbClient.from("taxonomy_state").upsert({
        room, state: clone(S), updated_at: new Date().toISOString()
      });
    }

    // Real-time broadcast channel
    sbChannel = sbClient.channel("room:" + room, {
      config: { broadcast: { self: false } }
    });

    sbChannel.on("broadcast", { event: "state" }, (msg) => {
      if (sbBusy) return;
      const d = msg.payload?.state;
      if (!isValidState(d)) return;
      sbBusy = true;
      S = migrateState(d) || d; render(); saveLocal();
      setTimeout(() => sbBusy = false, 80);
    }).subscribe((status) => {
      if (status === "SUBSCRIBED") {
        setChip("connected", "Live: " + room);
        toast("🟢 Live — " + room);
        document.getElementById("shareBtn").style.display = "";
        try { localStorage.setItem(LS_KEY+"-sb", JSON.stringify({url,key,room})); } catch(e){}
      } else if (status === "CHANNEL_ERROR") {
        setChip("","Offline"); toast("❌ Connection failed — check your credentials");
      }
    });

  } catch(err) {
    setChip("","Offline");
    toast("❌ " + err.message);
  }
}

function sbPush() {
  if (!sbClient || !sbChannel) return;
  clearTimeout(sbPushTimer);
  sbPushTimer = setTimeout(async () => {
    sbBusy = true;
    const state = clone(S);
    try {
      // Broadcast to live users (instant)
      await sbChannel.send({ type: "broadcast", event: "state", payload: { state } });
      // Persist to database (survives disconnects)
      await sbClient.from("taxonomy_state").upsert({
        room: sbRoom, state, updated_at: new Date().toISOString()
      });
    } catch(e) { toast("Sync error: " + e.message); }
    setTimeout(() => sbBusy = false, 80);
  }, 60);
}

function autoReconnect() {
  if (HARDCODED_SB_URL && HARDCODED_SB_KEY && HARDCODED_ROOM) {
    connectSupabase(HARDCODED_SB_URL, HARDCODED_SB_KEY, HARDCODED_ROOM); return;
  }
  try {
    const saved = localStorage.getItem(LS_KEY+"-sb");
    if (saved) { const {url,key,room} = JSON.parse(saved); connectSupabase(url,key,room); return; }
  } catch(e) {}
}

function setChip(state, label) {
  const c = document.getElementById("syncChip");
  c.className = "chip " + state; c.textContent = label;
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
let sortableInstances = [];

function render() {
  sortableInstances.forEach(s => { try { s.destroy(); } catch(e){} });
  sortableInstances = [];
  cur().versions = cur().versions || [];
  const board = document.getElementById("board");
  board.innerHTML = "";
  renderTabs();
  renderSidebar();

  cur().sections.forEach(sec => {
    const secEl = document.createElement("div");
    secEl.className = "section"; secEl.dataset.sid = sec.id;
    const hdr = document.createElement("div");
    hdr.className = "section-header";
    const labelSpan = document.createElement("span");
    labelSpan.className = "section-label"; labelSpan.title = "Double-click to rename";
    labelSpan.textContent = sec.label;
    labelSpan.ondblclick = () => startRenameSection(sec.id, labelSpan);
    const delBtn = document.createElement("button");
    delBtn.className = "section-btn del"; delBtn.title = "Delete section";
    delBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    delBtn.onclick = () => deleteSection(sec.id);
    hdr.innerHTML = `<span class="section-line"></span>`;
    hdr.appendChild(labelSpan);
    hdr.appendChild(delBtn);
    hdr.innerHTML += `<span class="section-line"></span>`;
    // Re-attach dynamic elements after innerHTML reset
    hdr.querySelector(".section-line:first-child"); // noop
    hdr.insertBefore(document.createTextNode(""), hdr.firstChild); // noop
    // Rebuild cleanly
    hdr.textContent = "";
    const line1 = document.createElement("span"); line1.className = "section-line";
    const line2 = document.createElement("span"); line2.className = "section-line";
    hdr.appendChild(line1); hdr.appendChild(labelSpan); hdr.appendChild(delBtn); hdr.appendChild(line2);
    secEl.appendChild(hdr);
    const row = document.createElement("div");
    row.className = "section-groups"; row.dataset.sid = sec.id;
    sec.groups.forEach(grp => row.appendChild(buildGroup(grp, sec.id)));
    const addBtn = document.createElement("button");
    addBtn.className = "add-group"; addBtn.innerHTML = "+ Add Group";
    addBtn.onclick = () => addGroup(sec.id);
    row.appendChild(addBtn);
    secEl.appendChild(row); board.appendChild(secEl);
    const so = Sortable.create(row, {
      group:"groups", handle:".drag-handle.group-drag", animation:120, filter:".add-group",
      onEnd(evt) {
        const gid = evt.item.dataset.gid;
        const fromSid = evt.from.dataset.sid, toSid = evt.to.dataset.sid;
        if (evt.oldIndex===evt.newIndex && fromSid===toSid) return;
        pushU();
        const fs = cur().sections.find(s=>s.id===fromSid), ts = cur().sections.find(s=>s.id===toSid);
        const [g] = fs.groups.splice(fs.groups.findIndex(g=>g.id===gid),1);
        ts.groups.splice(Math.max(0,evt.newIndex),0,g);
        saveLocal(); sbPush(); render();
      }
    });
    sortableInstances.push(so);
  });

  // Add Section button at the bottom
  const addSecWrap = document.createElement("div");
  addSecWrap.className = "add-section-wrap";
  const addSecBtn = document.createElement("button");
  addSecBtn.className = "add-section-btn";
  addSecBtn.textContent = "+ Add Section";
  addSecBtn.onclick = () => addSection();
  addSecWrap.appendChild(addSecBtn);
  board.appendChild(addSecWrap);
}

function buildGroup(grp, sid) {
  const el = document.createElement("div");
  el.className = "group"+(grp.oos?" oos":""); el.dataset.gid = grp.id;
  const hdr = document.createElement("div");
  hdr.className = "group-header";
  hdr.innerHTML = `
    <span class="drag-handle group-drag" title="Drag group">⠿</span>
    <div class="group-name-wrap"><span class="group-name" title="Double-click to rename">${esc(grp.name)}</span></div>
    <div class="group-actions">
      <button class="icon-btn" title="${grp.oos?"Mark In Scope":"Mark Out of Scope"}" onclick="toggleGroupOos('${grp.id}')">${grp.oos?
        `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>` :
        `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
      }</button>
      <button class="icon-btn red" title="Delete group" onclick="deleteGroup('${sid}','${grp.id}')">✕</button>
    </div>`;
  hdr.querySelector(".group-name").ondblclick = () => startRenameGroup(grp.id, hdr.querySelector(".group-name"));
  el.appendChild(hdr);
  const list = document.createElement("div");
  list.className = "domain-list"; list.dataset.gid = grp.id;
  (grp.domains||[]).forEach(d => list.appendChild(buildDomain(d, grp.id)));
  el.appendChild(list);
  const addRow = document.createElement("div");
  addRow.className = "add-domain";
  const inp = document.createElement("input");
  inp.className = "add-domain-input"; inp.placeholder = "Add domain…";
  inp.onkeydown = e => { if (e.key==="Enter") addDomain(grp.id, inp); };
  const addBtn = document.createElement("button");
  addBtn.className = "add-domain-btn"; addBtn.textContent = "+";
  addBtn.onclick = () => addDomain(grp.id, inp);
  addRow.appendChild(inp); addRow.appendChild(addBtn); el.appendChild(addRow);
  const so = Sortable.create(list, {
    group:"domains", animation:100, ghostClass:"sortable-ghost", chosenClass:"sortable-chosen",
    onEnd(evt) {
      const did = evt.item.dataset.did;
      const fg = evt.from.dataset.gid, tg = evt.to.dataset.gid;
      if (evt.oldIndex===evt.newIndex && fg===tg) return;
      pushU();
      const fgrp = findGroup(fg), tgrp = findGroup(tg);
      const [d] = fgrp.domains.splice(fgrp.domains.findIndex(d=>d.id===did),1);
      tgrp.domains.splice(evt.newIndex,0,d);
      saveLocal(); sbPush(); render();
    }
  });
  sortableInstances.push(so);
  return el;
}

function buildDomain(d, gid) {
  const el = document.createElement("div");
  el.className = "domain"+(d.oos?" oos":""); el.dataset.did = d.id;
  const pri = d.priority || "";
  const priHtml = pri ? `<span class="flag flag-${pri.toLowerCase()}" title="Priority: ${pri} — click to cycle H→M→L→off" onclick="cyclePriority('${gid}','${d.id}')">${pri}</span>` : "";
  const oosHtml = d.oos ? `<span class="flag flag-oos">OOS</span>` : "";
  el.innerHTML = `<span class="domain-name" title="Double-click to rename">${esc(d.name)}</span>${priHtml}${oosHtml}<span class="domain-del" title="Delete" onclick="deleteDomain('${gid}','${d.id}')">✕</span>`;
  el.querySelector(".domain-name").ondblclick = () => startRenameDomain(d.id, gid, el.querySelector(".domain-name"));
  el.oncontextmenu = e => { e.preventDefault(); cyclePriority(gid, d.id); };
  return el;
}

function startRenameGroup(gid, span) {
  const inp = document.createElement("input");
  inp.className = "group-name-input"; inp.value = span.textContent;
  span.replaceWith(inp); inp.focus(); inp.select();
  const commit = () => { const v=inp.value.trim(); if(v){pushU();const g=findGroup(gid);if(g){g.name=v;saveLocal();sbPush();}} render(); };
  inp.onblur = commit;
  inp.onkeydown = e => { if(e.key==="Enter") inp.blur(); if(e.key==="Escape") render(); };
}
function startRenameDomain(did, gid, span) {
  const inp = document.createElement("input");
  inp.className = "domain-name-input"; inp.value = span.textContent;
  span.replaceWith(inp); inp.focus(); inp.select();
  const commit = () => { const v=inp.value.trim(); if(v){pushU();const d=findDomain(gid,did);if(d){d.name=v;saveLocal();sbPush();}} render(); };
  inp.onblur = commit;
  inp.onkeydown = e => { if(e.key==="Enter") inp.blur(); if(e.key==="Escape") render(); };
}

function startRenameSection(sid, span) {
  const inp = document.createElement("input");
  inp.className = "section-label-input"; inp.value = span.textContent;
  span.replaceWith(inp); inp.focus(); inp.select();
  const commit = () => { const v=inp.value.trim(); if(v){pushU();const sec=cur().sections.find(s=>s.id===sid);if(sec){sec.label=v;saveLocal();sbPush();}} render(); };
  inp.onblur = commit;
  inp.onkeydown = e => { if(e.key==="Enter") inp.blur(); if(e.key==="Escape") render(); };
}
function addSection() {
  const name = prompt("New section name:"); if (!name||!name.trim()) return;
  pushU(); cur().sections.push({id:genId(), label:name.trim().toUpperCase(), groups:[]});
  saveLocal(); sbPush(); render();
}
function deleteSection(sid) {
  const sec = cur().sections.find(s=>s.id===sid);
  if (!sec) return;
  if (sec.groups.length > 0 && !confirm(`Delete "${sec.label}" and all its groups?`)) return;
  pushU(); cur().sections = cur().sections.filter(s=>s.id!==sid);
  saveLocal(); sbPush(); render();
}
function addGroup(sid) {
  const name = prompt("New group name:"); if (!name||!name.trim()) return;
  pushU(); cur().sections.find(s=>s.id===sid).groups.push({id:genId(),name:name.trim(),oos:false,domains:[]});
  saveLocal(); sbPush(); render();
}
function deleteGroup(sid, gid) {
  const g = findGroup(gid); if (!confirm(`Delete "${g.name}" and all its domains?`)) return;
  pushU(); const sec=cur().sections.find(s=>s.id===sid); sec.groups=sec.groups.filter(g=>g.id!==gid);
  saveLocal(); sbPush(); render();
}
function toggleGroupOos(gid) {
  pushU(); const g=findGroup(gid); g.oos=!g.oos; g.domains.forEach(d=>d.oos=g.oos);
  saveLocal(); sbPush(); render();
}
function addDomain(gid, inp) {
  const val=inp.value.trim(); if (!val) return;
  pushU(); findGroup(gid).domains.push({id:genId(),name:val,flags:[]});
  inp.value=""; saveLocal(); sbPush(); render();
}
function deleteDomain(gid, did) {
  pushU(); const g=findGroup(gid); g.domains=g.domains.filter(d=>d.id!==did);
  saveLocal(); sbPush(); render();
}

// ── VERSION HISTORY ────────────────────────────────────────────────────
function toggleSidebar() {
  document.body.classList.toggle("sidebar-open");
  document.getElementById("sidebar").classList.toggle("open");
}
function renderSidebar() {
  const body = document.getElementById("sidebarBody");
  const badge = document.getElementById("vBadge");
  if (!body) return;
  const vs = cur().versions || [];
  if (badge) { badge.textContent = vs.length; badge.style.display = vs.length ? "" : "none"; }
  if (vs.length === 0) {
    body.innerHTML = `<div class="sidebar-empty">No saved versions yet.<br><br>Click <strong>💾 Save Version</strong> to snapshot the current state of the board.<br><br>Your team can then restore any version at any time.</div>`;
    return;
  }
  body.innerHTML = vs.map((v, i) => {
    const d = new Date(v.timestamp);
    const dateStr = d.toLocaleDateString("en-AU", {day:"numeric", month:"short", year:"numeric"});
    const timeStr = d.toLocaleTimeString("en-AU", {hour:"2-digit", minute:"2-digit"});
    const num = vs.length - i;
    return `<div class="v-item">
      <div class="v-num">Version ${num}</div>
      <div class="v-name">${esc(v.name)}</div>
      <div class="v-meta">${dateStr} · ${timeStr}</div>
      <div class="v-btns">
        <button class="v-btn" onclick="restoreVersion('${v.id}')">↩ Restore</button>
        <button class="v-btn danger" onclick="deleteVersion('${v.id}')">✕ Delete</button>
      </div>
    </div>`;
  }).join("");
}
function saveVersion() {
  const name = prompt("Name this version (e.g. 'Before Q3 review', 'Draft v2'):"); if (!name||!name.trim()) return;
  cur().versions = cur().versions || [];
  cur().versions.unshift({ id: genId(), name: name.trim(), timestamp: Date.now(), snapshot: { sections: clone(cur().sections) } });
  if (cur().versions.length > 30) cur().versions = cur().versions.slice(0, 30);
  saveLocal(); sbPush(); renderSidebar();
  // Open sidebar so they see it
  document.body.classList.add("sidebar-open");
  document.getElementById("sidebar").classList.add("open");
  toast("💾 Version saved: " + name.trim());
}
function restoreVersion(vid) {
  const v = (cur().versions||[]).find(v=>v.id===vid); if (!v) return;
  if (!confirm(`Restore "${v.name}"?\n\nYour current layout will be overwritten. You can undo with Ctrl+Z.`)) return;
  pushU(); cur().sections = clone(v.snapshot.sections);
  saveLocal(); sbPush(); render();
  toast("↩ Restored: " + v.name);
}
function deleteVersion(vid) {
  const v = (cur().versions||[]).find(v=>v.id===vid); if (!v) return;
  if (!confirm(`Delete version "${v.name}"? This can't be undone.`)) return;
  cur().versions = cur().versions.filter(v=>v.id!==vid);
  saveLocal(); sbPush(); renderSidebar();
  toast("🗑 Version deleted");
}

function findGroup(gid) { for (const s of cur().sections) for (const g of s.groups) if (g.id===gid) return g; return null; }
function findDomain(gid,did) { const g=findGroup(gid); return g?g.domains.find(d=>d.id===did):null; }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function openConnectModal() {
  try { const s=localStorage.getItem(LS_KEY+"-sb"); if(s){const{url,key,room}=JSON.parse(s);document.getElementById("sbUrlInput").value=url;document.getElementById("sbKeyInput").value=key;document.getElementById("sbRoomInput").value=room;} } catch(e){}
  document.getElementById("connectOverlay").classList.add("open");
}
function connectFromModal() {
  const url=document.getElementById("sbUrlInput").value.trim();
  const key=document.getElementById("sbKeyInput").value.trim();
  const room=document.getElementById("sbRoomInput").value.trim();
  if (!url||!key||!room) { toast("❌ Fill in all fields"); return; }
  closeModal("connectOverlay"); connectSupabase(url,key,room);
}
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

function shareUrl() {
  const url = location.origin+location.pathname+"?room="+encodeURIComponent(sbRoom);
  document.getElementById("shareUrlText").textContent = url;
  document.getElementById("shareOverlay").classList.add("open");
}
function copyShareUrl() {
  navigator.clipboard.writeText(document.getElementById("shareUrlText").textContent)
    .then(()=>{ toast("✅ Link copied!"); closeModal("shareOverlay"); });
}

function cyclePriority(gid, did) {
  pushU();
  const d = findDomain(gid, did); if (!d) return;
  const cycle = {"":"H","H":"M","M":"L","L":""};
  const prev = d.priority || "";
  d.priority = cycle[prev];
  saveLocal(); sbPush(); render();
  const label = {"H":"🔴 High","M":"🟡 Medium","L":"🟢 Low","":"removed"}[d.priority];
  toast("Priority " + label);
}

function exportExcel() {
  // Build rows
  const rows = [["Section","Group","Domain","OOS","Priority"]];
  const scenarioName = cur().name || "Scenario";
  rows[0].unshift("Scenario");
  cur().sections.forEach(sec => {
    sec.groups.forEach(grp => {
      if (grp.domains.length === 0) {
        rows.push([scenarioName, sec.label, grp.name, "", grp.oos?"Yes":"", ""]);
      } else {
        grp.domains.forEach(d => {
          rows.push([scenarioName, sec.label, grp.name, d.name, d.oos?"Yes":"", d.priority||""]);
        });
      }
    });
  });
  // Build CSV (no external lib needed — works as Excel-compatible UTF-8 CSV)
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const bom = "﻿"; // UTF-8 BOM so Excel opens it correctly
  const blob = new Blob([bom + csv], {type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "domain-taxonomy.csv";
  a.click();
  toast("✅ Exported to Excel");
}

function exportJSON() {
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:"application/json"}));
  a.download="domain-taxonomy.json"; a.click(); toast("✅ Exported");
}
function importJSON() {
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json";
  inp.onchange=()=>{ const r=new FileReader(); r.onload=e=>{ try{ const d=JSON.parse(e.target.result); const m=migrateState(d); if(!m) throw new Error("Invalid file"); pushU();S=m;saveLocal();sbPush();render();toast("✅ Imported"); }catch(ex){toast("❌ "+ex.message);} }; r.readAsText(inp.files[0]); }; inp.click();
}
function resetToDefault() {
  if (!confirm("Reset to default taxonomy? All edits will be lost.")) return;
  pushU(); S=clone(DEFAULT_STATE); saveLocal(); sbPush(); render(); toast("↺ Reset to default");
}

// ── SCENARIO TABS ──────────────────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById("tabBar");
  if (!bar) return;
  bar.innerHTML = "";
  const scenarios = S.scenarios || [];
  scenarios.forEach(sc => {
    const tab = document.createElement("div");
    tab.className = "tab" + (sc.id === S.activeScenario ? " active" : "");
    tab.dataset.scid = sc.id;
    const nameSpan = document.createElement("span");
    nameSpan.className = "tab-name";
    nameSpan.textContent = sc.name;
    nameSpan.ondblclick = e => { e.stopPropagation(); startRenameScenario(sc.id, nameSpan); };
    tab.appendChild(nameSpan);
    if (scenarios.length > 1) {
      const del = document.createElement("button");
      del.className = "tab-del"; del.title = "Delete scenario"; del.textContent = "×";
      del.onclick = e => { e.stopPropagation(); deleteScenario(sc.id); };
      tab.appendChild(del);
    }
    tab.onclick = () => switchScenario(sc.id);
    bar.appendChild(tab);
  });
  const addBtn = document.createElement("button");
  addBtn.className = "tab-add"; addBtn.title = "Add scenario"; addBtn.textContent = "+";
  addBtn.onclick = addScenario;
  bar.appendChild(addBtn);
}
function switchScenario(id) {
  if (S.activeScenario === id) return;
  S.activeScenario = id;
  saveLocal(); sbPush(); render();
}
function addScenario() {
  const name = prompt("Scenario name (e.g. 'Option B', 'Q4 Draft'):"); if (!name||!name.trim()) return;
  const copy = confirm("Start with a copy of the current scenario?\n\nOK = copy current layout\nCancel = start blank");
  const id = genId();
  const newSc = { id, name: name.trim(), versions: [],
    sections: copy ? clone(cur().sections) : clone(DEFAULT_STATE.scenarios[0].sections) };
  pushU(); S.scenarios.push(newSc); S.activeScenario = id;
  saveLocal(); sbPush(); render();
  toast("✅ Created: " + name.trim());
}
function deleteScenario(id) {
  if (S.scenarios.length <= 1) return toast("Can't delete the last scenario");
  const sc = S.scenarios.find(s=>s.id===id); if (!sc) return;
  if (!confirm(`Delete scenario "${sc.name}" and all its content?`)) return;
  pushU(); S.scenarios = S.scenarios.filter(s=>s.id!==id);
  if (S.activeScenario === id) S.activeScenario = S.scenarios[0].id;
  saveLocal(); sbPush(); render();
  toast("🗑 Scenario deleted");
}
function startRenameScenario(id, span) {
  const inp = document.createElement("input");
  inp.className = "tab-name-input"; inp.value = span.textContent;
  span.replaceWith(inp); inp.focus(); inp.select();
  const commit = () => { const v=inp.value.trim(); if(v){pushU();const sc=S.scenarios.find(s=>s.id===id);if(sc){sc.name=v;saveLocal();sbPush();}} renderTabs(); };
  inp.onblur = commit;
  inp.onkeydown = e => { if(e.key==="Enter") inp.blur(); if(e.key==="Escape") renderTabs(); };
  inp.onclick = e => e.stopPropagation();
}

document.addEventListener("keydown", e => {
  if ((e.ctrlKey||e.metaKey)&&e.key==="z"&&!e.shiftKey) { e.preventDefault(); doUndo(); }
  if ((e.ctrlKey||e.metaKey)&&(e.key==="y"||(e.key==="z"&&e.shiftKey))) { e.preventDefault(); doRedo(); }
});
document.querySelectorAll(".overlay").forEach(el => {
  el.addEventListener("click", e => { if (e.target===el) el.classList.remove("open"); });
});

Object.assign(window, {
  toast, doUndo, doRedo, openConnectModal, connectFromModal, closeModal,
  shareUrl, copyShareUrl, exportJSON, importJSON, resetToDefault,
  addGroup, deleteGroup, toggleGroupOos, addDomain, deleteDomain,
  startRenameSection, addSection, deleteSection,
  toggleSidebar, saveVersion, restoreVersion, deleteVersion,
  cyclePriority, exportExcel,
  switchScenario, addScenario, deleteScenario, startRenameScenario
});

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════
try { loadLocal(); } catch(e) {}
if (!isValidState(S)) S = clone(DEFAULT_STATE);
if (!S.scenarios) S = migrateState(S) || clone(DEFAULT_STATE);
if (!S.activeScenario) S.activeScenario = S.scenarios[0].id;
try { render(); } catch(e) { S = clone(DEFAULT_STATE); render(); }
autoReconnect();
</script>
</body>
</html>
